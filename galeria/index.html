<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Galeria De Fotos | Barbearia Raphael Malfara</title>
  <meta name="robots" content="index,follow" />
  <link rel="icon" href="../logo.png" type="image/png" />

  <style>
    :root{
      --bg:#000000;
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --line:rgba(255,255,255,.14);
      --radius:18px;
      --max:1160px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:var(--max); margin:0 auto; padding:20px}
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-weight:650;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }
    .ph{
      aspect-ratio: 1/1;
      border-radius: 16px;
      border:1px solid var(--line);
      overflow:hidden;
      background: rgba(255,255,255,.04);
      cursor: zoom-in;
    }
    .ph img{width:100%; height:100%; object-fit:cover; display:block}

    /* Modal simples */
    .modal{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.88);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:9999;
    }
    .modal.open{display:flex;}
    .modal img{
      max-width: min(1100px, 95vw);
      max-height: 85vh;
      border-radius: 14px;
      border:1px solid var(--line);
      background:#000;
    }
    .close{
      position:fixed;
      top:14px;
      right:14px;
      width:46px;
      height:46px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      display:grid;
      place-items:center;
      font-size:20px;
      cursor:pointer;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns: repeat(2, 1fr);}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div style="font-size:20px; font-weight:650;">Galeria De Fotos</div>
        <div style="color:var(--muted); font-size:13px;">Barbearia Raphael Malfara • Monte Aprazível/SP</div>
      </div>
      <a class="btn" href="../">Voltar Para O Site</a>
    </div>

    <!-- Como Usar:
         Suba suas fotos dentro da pasta /galeria/ com nomes:
         foto05.jpg, foto06.jpg, etc.
         Depois duplique os blocos abaixo e troque o src.
    -->
    <div class="grid" id="grid">
      <div class="ph"><img src="foto05.jpg" alt="Foto 05" loading="lazy"></div>
      <div class="ph"><img src="foto06.jpg" alt="Foto 06" loading="lazy"></div>
      <div class="ph"><img src="foto07.jpg" alt="Foto 07" loading="lazy"></div>
      <div class="ph"><img src="foto08.jpg" alt="Foto 08" loading="lazy"></div>
    </div>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="close" id="close">✕</div>
    <img id="modalImg" src="" alt="Foto Ampliada">
  </div>

  <script>
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.getElementById("close");

    document.getElementById("grid").addEventListener("click", (e) => {
      const img = e.target.closest("img");
      if(!img) return;
      modalImg.src = img.getAttribute("src");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    });

    function closeModal(){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      modalImg.src = "";
    }

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if(e.target === modal) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape") closeModal();
    });
  </script>
</body>
</html>
