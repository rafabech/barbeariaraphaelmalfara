<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Galeria De Fotos | Barbearia Raphael Malfara</title>
  <meta name="robots" content="index,follow" />
  <link rel="icon" href="../logo.png" type="image/png" />

  <style>
    :root{
      --bg:#000000;
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --line:rgba(255,255,255,.14);
      --radius:18px;
      --max:1160px;
      --shadow: 0 18px 45px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:var(--max); margin:0 auto; padding:20px}
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-weight:650;
    }

    .card{
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow:hidden;
      padding:14px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:10px;
    }
    .ph{
      aspect-ratio: 1/1;
      border-radius: 16px;
      border:1px solid var(--line);
      overflow:hidden;
      background: rgba(255,255,255,.04);
      cursor: zoom-in;
    }
    .ph img{width:100%; height:100%; object-fit:cover; display:block}

    .modal{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.88);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:9999;
    }
    .modal.open{display:flex;}
    .modal img{
      max-width: min(1100px, 95vw);
      max-height: 85vh;
      border-radius: 14px;
      border:1px solid var(--line);
      background:#000;
    }
    .close{
      position:fixed;
      top:14px;
      right:14px;
      width:46px;
      height:46px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      display:grid;
      place-items:center;
      font-size:20px;
      cursor:pointer;
    }

    @media (max-width: 1100px){ .grid{grid-template-columns: repeat(4, 1fr);} }
    @media (max-width: 820px){ .grid{grid-template-columns: repeat(3, 1fr);} }
    @media (max-width: 560px){ .grid{grid-template-columns: repeat(2, 1fr);} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div style="font-size:20px; font-weight:650;">Galeria De Fotos</div>
        <div style="color:var(--muted); font-size:13px;">Barbearia Raphael Malfara • Monte Aprazível/SP</div>
      </div>
      <a class="btn" href="../">Voltar Para O Site</a>
    </div>

    <div class="card">
      <div class="grid" id="grid">
        <!-- Primeiras -->
        <div class="ph"><img src="foto01.png" alt="Foto 01" loading="lazy"></div>
        <div class="ph"><img src="foto02.png" alt="Foto 02" loading="lazy"></div>
        <div class="ph"><img src="foto03.png" alt="Foto 03" loading="lazy"></div>
        <div class="ph"><img src="foto04.png" alt="Foto 04" loading="lazy"></div>

        <!-- Foto25 a Foto29 Logo No Começo -->
        <div class="ph"><img src="foto25.png" alt="Foto 25" loading="lazy"></div>
        <div class="ph"><img src="foto26.png" alt="Foto 26" loading="lazy"></div>
        <div class="ph"><img src="foto27.png" alt="Foto 27" loading="lazy"></div>
        <div class="ph"><img src="foto28.png" alt="Foto 28" loading="lazy"></div>
        <div class="ph"><img src="foto29.png" alt="Foto 29" loading="lazy"></div>

        <!-- Restante -->
        <div class="ph"><img src="foto05.png" alt="Foto 05" loading="lazy"></div>
        <div class="ph"><img src="foto06.png" alt="Foto 06" loading="lazy"></div>
        <div class="ph"><img src="foto07.png" alt="Foto 07" loading="lazy"></div>
        <div class="ph"><img src="foto08.png" alt="Foto 08" loading="lazy"></div>
        <div class="ph"><img src="foto09.png" alt="Foto 09" loading="lazy"></div>
        <div class="ph"><img src="foto10.png" alt="Foto 10" loading="lazy"></div>

        <div class="ph"><img src="foto11.png" alt="Foto 11" loading="lazy"></div>
        <div class="ph"><img src="foto12.png" alt="Foto 12" loading="lazy"></div>
        <div class="ph"><img src="foto13.png" alt="Foto 13" loading="lazy"></div>
        <div class="ph"><img src="foto14.png" alt="Foto 14" loading="lazy"></div>
        <div class="ph"><img src="foto15.png" alt="Foto 15" loading="lazy"></div>
        <div class="ph"><img src="foto16.png" alt="Foto 16" loading="lazy"></div>
        <div class="ph"><img src="foto17.png" alt="Foto 17" loading="lazy"></div>
        <div class="ph"><img src="foto18.png" alt="Foto 18" loading="lazy"></div>
        <div class="ph"><img src="foto19.png" alt="Foto 19" loading="lazy"></div>
        <div class="ph"><img src="foto20.png" alt="Foto 20" loading="lazy"></div>

        <div class="ph"><img src="foto21.png" alt="Foto 21" loading="lazy"></div>
        <div class="ph"><img src="foto22.png" alt="Foto 22" loading="lazy"></div>
        <div class="ph"><img src="foto23.png" alt="Foto 23" loading="lazy"></div>
        <div class="ph"><img src="foto24.png" alt="Foto 24" loading="lazy"></div>

        <div class="ph"><img src="foto30.png" alt="Foto 30" loading="lazy"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="close" id="close">✕</div>
    <img id="modalImg" src="" alt="Foto Ampliada">
  </div>

  <script>
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.getElementById("close");

    document.getElementById("grid").addEventListener("click", (e) => {
      const img = e.target.closest("img");
      if(!img) return;
      modalImg.src = img.getAttribute("src");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    });

    function closeModal(){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      modalImg.src = "";
    }

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if(e.target === modal) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape") closeModal();
    });
  </script>
</body>
</html>
